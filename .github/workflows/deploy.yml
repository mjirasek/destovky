name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_ACTIONS: true   # vite.config.ts reads this to set base=/destovky/

      - name: Push dist/ to mjirasek/destovky → gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_PAT }}
          external_repository: mjirasek/destovky
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
